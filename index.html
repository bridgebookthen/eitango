<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eitango</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>eitango</h1>
      <p class="hint">英単語を覚えるためのシンプルな単語帳です。</p>

      <section class="card" aria-live="polite">
        <p class="label">Word</p>
        <p id="word" class="word">-</p>
        <p id="meaning" class="meaning hidden">-</p>
      </section>

      <section class="controls">
        <button id="revealBtn" type="button">意味を表示</button>
        <button id="nextBtn" type="button">次へ</button>
        <button id="shuffleBtn" type="button">シャッフル</button>
      </section>

      <section class="controls secondary">
        <button id="knownBtn" type="button">覚えた</button>
        <button id="unknownBtn" type="button">まだ</button>
      </section>

      <section class="card add-word-card">
        <p class="label">単語を追加</p>
        <form id="addWordForm" class="add-word-form">
          <input id="newWordInput" type="text" placeholder="英単語" required />
          <input id="newMeaningInput" type="text" placeholder="意味" required />
          <button type="submit">追加</button>
        </form>
      </section>

      <p id="status" class="status">Known: 0 / Unknown: 0</p>
    </main>

    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
